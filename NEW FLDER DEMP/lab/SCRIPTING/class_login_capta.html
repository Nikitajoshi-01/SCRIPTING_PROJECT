<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page with Captcha</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            /* background: linear-gradient(to right, #4facfe, #00f2fe); */
            /* display: flex; */
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            /* box-shadow: 0px 5px 15px rgba(0,0,0,0.2); */
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #00c6ff;
        }

        .captcha-box {
            margin-top: 10px;
        }

        .error {
            color: red;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <form onsubmit="return validateForm()">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>

        <div class="captcha-box">
            <label id="captchaQuestion"></label>
            <input type="number" id="captchaAnswer" placeholder="Enter sum" required>
        </div>

        <div class="error" id="errorMessage"></div>

        <button type="submit">Login</button>
    </form>
</div>

<script>
    let num1, num2, correctAnswer;

    function generateCaptcha() {
        num1 = Math.floor(Math.random() * 10) + 1;
        num2 = Math.floor(Math.random() * 10) + 1;
        correctAnswer = num1 + num2;
        document.getElementById("captchaQuestion").innerText =
            "What is " + num1 + " + " + num2 + " ?";
    }

    function validateForm() {
        let userAnswer = document.getElementById("captchaAnswer").value;
        let errorMessage = document.getElementById("errorMessage");

        if (parseInt(userAnswer) !== correctAnswer) {
            errorMessage.innerText = "Incorrect CAPTCHA. Try again.";
            generateCaptcha();
            return false; // Prevent form submission
        }

        alert("Login Successful!");
        return true;
    }

    generateCaptcha();
</script>

</body>
</html>
