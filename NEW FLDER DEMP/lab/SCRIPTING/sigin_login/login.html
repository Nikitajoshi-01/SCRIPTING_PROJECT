<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

.container{
width:320px;
margin:auto;
margin-top:120px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:8px;
margin:6px;
}

button{
padding:8px 15px;
background:green;
color:white;
border:none;
cursor:pointer;
}

.error{color:red;}
.success{color:green;}
</style>

</head>

<body>

<div class="container">

<h2>Sign In</h2>

<input type="text" id="loginUser" placeholder="Username"><br>

<input type="password" id="loginPass" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<p>New user?  
<a href="signin.html">Register Here</a>
</p>

</div>

<script>

function login(){

let user=document.getElementById("loginUser").value;
let pass=document.getElementById("loginPass").value;

let storedUser=localStorage.getItem("username");
let storedPass=localStorage.getItem("password");

let msg=document.getElementById("msg");

if(user===storedUser && pass===storedPass){
msg.innerHTML="Login Successful!";
msg.className="success";
}
else{
msg.innerHTML="Invalid username or password";
msg.className="error";
}

}

</script>

</body>
</html>
