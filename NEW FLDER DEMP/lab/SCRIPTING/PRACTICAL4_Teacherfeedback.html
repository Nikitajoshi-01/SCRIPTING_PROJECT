<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty Feedback Form</title>
    <style>
        body {
            /* text-decoration-color: white; */
            background-color: #f4f6f9;
        }

        .container {
            text-decoration-color: #f4f6f9;
            width: 500px;
            margin: 40px auto;
            padding: 25px;
            background-color: rgb(36, 70, 92);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            color: white;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 6px 0 15px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .radio-group {
            margin-bottom: 15px;
        }

        .radio-group input {
            width: auto;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Faculty Feedback Form</h2>

    <form id="feedbackForm">

      
        <label for="name">Student Name:</label>
        <input type="text" id="name" name="name" required>

        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required pattern=".+@nitkkr\.ac\.in">

     
        <label for="faculty">Faculty Name:</label>
        <select id="faculty" name="faculty" required>
            <option value="">-- Select Faculty --</option>
            <option value="Prof. shweta Sharma maam ">Prof. shweta Sharma maam </option>
            <option value="Prof.xyz">Prof. xyz</option>
            <option value="Prof. abc">Prof. abc</option>
        </select>


        <label>Rating:</label>
        <div class="radio-group">
            <input type="radio" name="rating" value="Excellent"> Excellent
            <input type="radio" name="rating" value="Good"> Good
            <input type="radio" name="rating" value="Average"> Average
            <input type="radio" name="rating" value="Poor"> Poor
        </div>

      
        <label for="positive">Positive Aspects:</label>
        <textarea id="positive" name="positive" rows="4" required></textarea>

       
        <label for="improvement">Areas for Improvement:</label>
        <textarea id="improvement" name="improvement" rows="4" required></textarea>

        
        <button type="submit">Submit Feedback</button>

        <p id="errorMsg" class="error"></p>

    </form>
</div>
</body>
</html>
